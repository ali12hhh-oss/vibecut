name: vibecut_pro
description: "A professional video editor project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  ffmpeg_kit_flutter_full_gpl: ^7.0.0
  easy_localization: ^3.0.2
  arabic_reshaper: ^0.0.1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/core/fonts/Tajawal-Regular.ttf
        - asset: assets/core/fonts/Tajawal-Bold.ttf
          weight: 700
    - family: Cairo
      fonts:
        - asset: assets/core/fonts/Cairo-Regular.ttf
    - family: Almarai
      fonts:
        - asset: assets/core/fonts/Almarai-Regular.ttf

  assets:
    # الموارد الأساسية (Offline)
    - assets/core/fonts/
    - assets/core/translations/
    - assets/core/stickers/
    - assets/core/filters/
    - assets/core/effects/overlays/
    - assets/core/effects/transitions/
    - assets/core/text_presets/
    
    # موارد التحميل الديناميكي (Cloud/Downloadable)
    - assets/downloads/extra_fonts/
    - assets/downloads/extra_stickers/
    - assets/downloads/extra_filters/
